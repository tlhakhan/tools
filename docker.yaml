---
- name: Install Docker
  hosts: my_hosts
  gather_facts: True
  become: True

  vars:
    docker_compose_version: v5.1.3

  tasks:
    - name: Install prerequisite packages
      apt:
        update_cache: True
        name: '{{ item }}'
        state: present
      loop:
        - ca-certificates
        - curl
        - gnupg

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      shell: curl -fsSL https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Set Docker GPG key permissions
      file:
        path: /etc/apt/keyrings/docker.gpg
        mode: 'a+r'

    - name: Add Docker APT repository x86_64
      copy:
        dest: /etc/apt/sources.list.d/docker.list
        content: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }} {{ ansible_facts['distribution_release'] }} stable\n"
      when: ansible_facts['machine'] == "x86_64"

    - name: Add Docker APT repository aarch64
      copy:
        dest: /etc/apt/sources.list.d/docker.list
        content: "deb [arch=arm64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }} {{ ansible_facts['distribution_release'] }} stable\n"
      when: ansible_facts['machine'] == "aarch64"

    - name: Create Docker config folder
      file:
        path: /etc/docker
        state: directory

    - name: Setup daemon.json
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "json-file",
            "bip": "192.168.127.5/24",
            "default-address-pools": [
              {
                "base": "192.168.128.0/17",
                "size": 24
              }
            ]
          }
      notify: restart docker

    - name: Install Docker packages
      apt:
        update_cache: True
        name: '{{ item }}'
        state: latest
      loop:
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: True

    - name: Install docker-compose x86_64
      get_url:
        url: https://github.com/docker/compose/releases/download/{{ docker_compose_version }}/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'
      when: ansible_facts['machine'] == "x86_64"

    - name: Install docker-compose aarch64
      get_url:
        url: https://github.com/docker/compose/releases/download/{{ docker_compose_version }}/docker-compose-linux-aarch64
        dest: /usr/local/bin/docker-compose
        mode: '0755'
      when: ansible_facts['machine'] == "aarch64"

    - name: Add user to docker group
      debug:
        msg: "example command: usermod -aG docker <user name>"

  handlers:
    - name: restart docker
      service:
        name: docker
        state: restarted
